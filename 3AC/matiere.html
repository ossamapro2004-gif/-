<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');

    <link rel="stylesheet" href="../assets/style.css">

    <nav class="glass-nav">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.52 16h12.96"></path></svg>

        <div class="nav-links">

    <main class="container">

            <p data-fr="Sélectionnez la simulation." data-ar="اختر المحاكاة.">Sélectionnez la simulation.</p>

        <div class="cards-grid sim-grid">
            <!-- 1. Oxydation du fer dans l'air -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 4 6 4 18 12 22 20 18 20 6"></polygon>
                        <line x1="12" y1="22" x2="12" y2="12"></line>
                        <line x1="12" y1="12" x2="4" y2="6"></line>
                        <line x1="12" y1="12" x2="20" y2="6"></line>
                        <!-- Rust spots -->
                        <circle cx="8" cy="14" r="1"></circle>
                        <circle cx="16" cy="16" r="0.5"></circle>
                        <circle cx="14" cy="11" r="0.75"></circle>
                    </svg>
                </div>
                <h3 data-fr="Oxydation du fer dans l'air" data-ar="أكسدة الحديد في الهواء">Oxydation du fer dans l'air</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">

                        <rect x="5" y="18" width="14" height="4" rx="1" transform="rotate(-10 12 20)"></rect>
                        <rect x="5" y="18" width="14" height="4" rx="1" transform="rotate(10 12 20)"></rect>
                    </svg>
                </div>
                <h3 data-fr="Combustion des matériaux organiques" data-ar="احتراق المواد العضوية">Combustion des matériaux organiques</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <!-- 3. Solutions Acides et Basiques -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3h10"></path>
                        <path d="M9 3v13a4 4 0 0 0 6 0V3"></path>
                        <path d="M9 10h6"></path>
                        <rect x="5" y="5" width="2" height="12"></rect>
                        <line x1="5" y1="8" x2="7" y2="8"></line>
                        <line x1="5" y1="11" x2="7" y2="11"></line>
                        <line x1="5" y1="14" x2="7" y2="14"></line>

                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>

            <!-- 4. Action des solutions sur les métaux et Test d'ions -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3v14a3 3 0 0 0 6 0V3"></path>
                        <path d="M5 3h10"></path>
                        <path d="M7 11h6"></path>
                        <circle cx="10" cy="15" r="1"></circle>
                        <circle cx="9" cy="16.5" r="0.5"></circle>
                        
                        <path d="M15 5v12a2 2 0 0 0 4 0V5"></path>
                        <path d="M14 5h6"></path>
                        <path d="M15 11h4"></path>
                        <path d="M16 16.5 L17 15 L18 16"></path>
                    </svg>
                </div>
