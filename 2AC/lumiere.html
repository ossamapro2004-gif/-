<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCSim</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24' stroke='%2300BFFF' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M10 2v7.31'/%3E%3Cpath d='M14 9.3V1.99'/%3E%3Cpath d='M8.5 2h7'/%3E%3Cpath d='M14 9.3a6.5 6.5 0 1 1-4 0'/%3E%3Cpath d='M5.52 16h12.96'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.52 16h12.96"></path></svg>
            PCSim
        </div>
        <div class="nav-links">
            <a href="../index.html" data-fr="Accueil" data-ar="الرئيسية">Accueil</a>
            <a href="../1AC/index.html" data-fr="1AC" data-ar="الأولى إعدادي">1AC</a>
            <a href="index.html" class="active" data-fr="2AC" data-ar="الثانية إعدادي">2AC</a>
            <a href="../3AC/index.html" data-fr="3AC" data-ar="الثالثة إعدادي">3AC</a>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-glass btn-icon" aria-label="Basculer le thème">🌙</button>
            <button id="lang-toggle" class="btn-glass">عربي</button>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1 data-fr="Lumière et Image" data-ar="الضوء والصورة">Lumière et Image</h1>
            <p data-fr="Sélectionnez la simulation." data-ar="اختر المحاكاة.">Sélectionnez la simulation.</p>
        </header>

        <div class="cards-grid sim-grid">
            <!-- 1. Dispersion de la lumière -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 4 4 19 20 19"></polygon>
                        <line x1="2" y1="14" x2="8" y2="14"></line>
                        <line x1="16" y1="14" x2="22" y2="10"></line>
                        <line x1="16" y1="14" x2="22" y2="14"></line>
                        <line x1="16" y1="14" x2="22" y2="18"></line>
                    </svg>
                </div>
                <h3 data-fr="Dispersion de la lumière" data-ar="تبديد الضوء">Dispersion de la lumière</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <!-- 2. Propagation de la lumière -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="5" cy="12" r="2"></circle>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <polyline points="18 9 21 12 18 15"></polyline>
                        <line x1="5" y1="7" x2="5" y2="8"></line>
                        <line x1="5" y1="16" x2="5" y2="17"></line>
                        <line x1="2" y1="12" x2="1" y2="12"></line>
                    </svg>
                </div>
                <h3 data-fr="Propagation de la lumière" data-ar="انتشار الضوء">Propagation de la lumière</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <!-- 3. Lentilles minces -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 4c2.5 0 2.5 16 0 16-2.5 0-2.5-16 0-16z"></path>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <line x1="7" y1="11" x2="7" y2="13"></line>
                        <line x1="17" y1="11" x2="17" y2="13"></line>
                    </svg>
                </div>
                <h3 data-fr="Lentilles minces" data-ar="العدسات الرقيقة">Lentilles minces</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <!-- 4. Instruments optiques -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 18l4-4"></path>
                        <path d="M15 5l2 2-6 6-2-2 6-6z"></path>
                        <path d="M17 7l3-3 2 2-3 3"></path>
                        <path d="M9 11l-2 2"></path>
                        <line x1="12" y1="18" x2="12" y2="14"></line>
                        <line x1="9" y1="21" x2="12" y2="18"></line>
                        <line x1="15" y1="21" x2="12" y2="18"></line>
                    </svg>
                </div>
                <h3 data-fr="Instruments optiques" data-ar="الأجهزة البصرية">Instruments optiques</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <!-- 5. Formation de l'image -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="10" width="2" height="6"></rect>
                        <path d="M4 10c0-2-1-2-1-4s1-2 1-2 1 0 1 2-1 2-1 4z"></path>
                        <line x1="12" y1="6" x2="12" y2="18"></line>
                        <polyline points="10 6 12 4 14 6"></polyline>
                        <polyline points="10 18 12 20 14 18"></polyline>
                        <line x1="20" y1="6" x2="20" y2="18"></line>
                        <line x1="1" y1="18" x2="23" y2="18"></line>
                    </svg>
                </div>
                <h3 data-fr="Formation de l'image" data-ar="تكوّن الصورة بالعدسة">Formation de l'image</h3>
                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>
        </div>
    </main>

    <script src="../assets/main.js"></script>
</body>
</html>
