<!DOCTYPE html>

            document.documentElement.setAttribute('data-theme', 'dark');

        <div class="nav-links">

            <p data-fr="Sélectionnez la simulation." data-ar="اختر المحاكاة.">Sélectionnez la simulation.</p>

        <div class="cards-grid sim-grid">
            <!-- 1. Propriétés de l'air -->
            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 21H3"></path>
                        <rect x="7" y="5" width="10" height="16" rx="1"></rect>

                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>

                <div class="card-icon">

                        <circle cx="19" cy="18" r="2.5"></circle>

                <div class="btn-explore" data-fr="Explorer →" data-ar="استكشف ←">Explorer →</div>
            </a>

            <a href="#" class="glass-card sim-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"></path>

            </a>

                <div class="card-icon">
