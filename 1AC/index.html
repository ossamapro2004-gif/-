<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1AC - Simulations Physique-Chimie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.52 16h12.96"></path></svg>
            PCSim
        </div>
        <div class="nav-links">
            <a href="../index.html" data-fr="Accueil" data-ar="الرئيسية">Accueil</a>
            <a href="index.html" class="active" data-fr="1AC" data-ar="الأولى إعدادي">1AC</a>
            <a href="../2AC/index.html" data-fr="2AC" data-ar="الثانية إعدادي">2AC</a>
            <a href="../3AC/index.html" data-fr="3AC" data-ar="الثالثة إعدادي">3AC</a>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-glass btn-icon" aria-label="Basculer le thème">🌙</button>
            <button id="lang-toggle" class="btn-glass">عربي</button>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1 data-fr="1ère Année Collège" data-ar="السنة الأولى إعدادي">1ère Année Collège</h1>
            <p data-fr="Sélectionnez une simulation." data-ar="اختر محاكاة.">Sélectionnez une simulation.</p>
        </header>

        <div class="cards-grid">
            <div class="glass-card">
                <div class="card-icon">
                    <!-- Droplet (Eau / Matière) -->
                    <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>
                </div>
                <h3 data-fr="États de la matière" data-ar="حالات المادة">États de la matière</h3>
                <div class="btn-explore" data-fr="Démarrer →" data-ar="ابدأ ←">Démarrer →</div>
            </div>
            <div class="glass-card">
                <div class="card-icon">
                    <!-- Circuit Électrique -->
                    <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                </div>
                <h3 data-fr="Circuit Électrique" data-ar="الدارة الكهربائية">Circuit Électrique</h3>
                <div class="btn-explore" data-fr="Démarrer →" data-ar="ابدأ ←">Démarrer →</div>
            </div>
        </div>
    </main>

    <script src="../assets/main.js"></script>
</body>
</html>
