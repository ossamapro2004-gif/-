<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCSim – Mesure du Volume</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24' stroke='%2300BFFF' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M10 2v7.31'/%3E%3Cpath d='M14 9.3V1.99'/%3E%3Cpath d='M8.5 2h7'/%3E%3Cpath d='M14 9.3a6.5 6.5 0 1 1-4 0'/%3E%3Cpath d='M5.52 16h12.96'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        /* CSS spécifique à la simulation pour les composants transparents */
        :root {
            --water-color: rgba(30, 144, 255, 0.6);
            --water-surface: rgba(100, 190, 255, 0.85);
            --liquid-current: var(--water-color);
            --liquid-surface-current: var(--water-surface);
            /* Verre en mode clair : léger fond bleuâtre-gris pour détacher du blanc */
            --glass-bg: rgba(70, 130, 180, 0.08);
            --glass-border: rgba(70, 130, 180, 0.25);
        }

        [data-theme="dark"], html[data-theme="dark"] {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* Adjustment for No Scroll View */
        main.container {
            transform: scale(0.67);
            transform-origin: top center;
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <a href="../index.html" class="logo" style="text-decoration:none; color:inherit;">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.52 16h12.96"></path></svg>
            PCSim
        </a>
        <div class="nav-links">
            <a href="../index.html" data-fr="Accueil" data-ar="الرئيسية">Accueil</a>
            <a href="index.html" class="active" data-fr="1AC" data-ar="الأولى إعدادي">1AC</a>
            <a href="../2AC/index.html" data-fr="2AC" data-ar="الثانية إعدادي">2AC</a>
            <a href="../3AC/index.html" data-fr="3AC" data-ar="الثالثة إعدادي">3AC</a>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-glass btn-icon" aria-label="Basculer le thème">🌙</button>
            <button id="lang-toggle" class="btn-glass">عربي</button>
        </div>
    </nav>

    <main class="container">
        <header class="hero" style="text-align: left; margin-bottom: 0.5rem; padding-bottom: 0;">
            <div class="breadcrumb" style="display:flex; gap:0.5rem; font-size:0.9rem; color:var(--text-muted); margin-bottom: 1rem;">
                <a href="index.html" style="color:var(--accent); text-decoration:none;">1AC</a>
                <span>›</span>
                <a href="matiere.html" style="color:var(--accent); text-decoration:none;" data-fr="Matière" data-ar="المادة">Matière</a>
                <span>›</span>
                <span style="font-weight:600;" id="breadcrumb-title" data-fr="Mesure du Volume" data-ar="قياس الحجم">Mesure du Volume</span>
            </div>
        </header>

        <div id="react-root"></div>
    </main>

    <script src="../assets/main.js"></script>
    
    <!-- React & Tailwind Setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            corePlugins: { preflight: false }
        }
    </script>
    <style>
        /* Essential Tailwind preflight for the root */
        #react-root *, #react-root ::before, #react-root ::after {
            box-sizing: border-box;
            border-width: 0;
            border-style: solid;
            border-color: #e2e8f0;
        }
        [data-theme="dark"] #react-root *, [data-theme="dark"] #react-root ::before, [data-theme="dark"] #react-root ::after {
            border-color: #475569;
        }
    </style>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RefreshCcw = ({className}) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
        );
        const Droplets = ({className}) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 6.16-2.29 6.16C3.57 10 3 11.09 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5 1.5 1.2 2 3.2 2 5.5a8 8 0 0 1-16 0c0-1.2.2-2.4.6-3.5"/></svg>
        );
        const AlertCircle = ({className}) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        );

        const MAX_VOLUME = 100;

        // Custom hook pour écouter les changements de langue
        const useBilingual = () => {
            const [lang, setLang] = useState(document.documentElement.lang || 'fr');
            useEffect(() => {
                const observer = new MutationObserver(() => setLang(document.documentElement.lang || 'fr'));
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });
                return () => observer.disconnect();
            }, []);
            return lang;
        };

        const TEXTS = {
            fr: {
                warnOverflow: "Attention : L'éprouvette va déborder !",
                objectsTitle: "1. Objets (Glissez et Déposez)",
                pourLiquid: "Ou verser un liquide",
                settingsTitle: "2. Paramètres",
                precisionLabel: "Précision des graduations :",
                initialLevel: "Volume initial :",
                resultsTitle: "3. Analyse & Résultats",
                vInitial: "Volume Initial (V₁) :",
                vFinal: "Volume Final (V₂) :",
                vAdded: "Volume de l'objet",
                emptyCylinder: "Vider l'éprouvette",
                ml: "mL"
            },
            ar: {
                warnOverflow: "تحذير: المخبار سيفيض!",
                objectsTitle: "1. الأجسام (اسحب وأسقط)",
                pourLiquid: "أو اسكب سائلاً",
                settingsTitle: "2. الإعدادات",
                precisionLabel: "دقة التدريج:",
                initialLevel: "المستوى البدئي:",
                resultsTitle: "3. قراءة النتائج",
                vInitial: "الحجم البدئي (V₁):",
                vFinal: "الحجم النهائي (V₂):",
                vAdded: "حجم الجسم المضاف",
                emptyCylinder: "إفراغ المخبار",
                ml: "مل"
            }
        };

        const SOLID_OBJECTS = {
          fr: [
            { id: 'stone', name: 'Pierre', volume: 14, color: 'bg-slate-700 dark:bg-slate-500', shape: 'rounded-[40%_60%_70%_30%_/_40%_50%_60%_50%]' },
            { id: 'cube', name: 'Cube', volume: 20, color: 'bg-slate-800 dark:bg-slate-600', shape: 'rounded-none' },
            { id: 'marble', name: 'Bille', volume: 8, color: 'bg-gradient-to-br from-cyan-200 via-blue-500 to-blue-900', shape: 'rounded-full shadow-[inset_-2px_-2px_5px_rgba(0,0,0,0.6),_inset_2px_2px_4px_rgba(255,255,255,0.8)]' },
          ],
          ar: [
            { id: 'stone', name: 'حجر', volume: 14, color: 'bg-slate-700 dark:bg-slate-500', shape: 'rounded-[40%_60%_70%_30%_/_40%_50%_60%_50%]' },
            { id: 'cube', name: 'مكعب', volume: 20, color: 'bg-slate-800 dark:bg-slate-600', shape: 'rounded-none' },
            { id: 'marble', name: 'كرية زجاجية', volume: 8, color: 'bg-gradient-to-br from-cyan-200 via-blue-500 to-blue-900', shape: 'rounded-full shadow-[inset_-2px_-2px_5px_rgba(0,0,0,0.6),_inset_2px_2px_4px_rgba(255,255,255,0.8)]' },
          ]
        };

        function App() {
          const lang = useBilingual();
          const t = TEXTS[lang];
          const isRtl = lang === 'ar';
          const objectsList = SOLID_OBJECTS[lang];
          
          const [initialVolume, setInitialVolume] = useState(40);
          const [objectsInCylinder, setObjectsInCylinder] = useState([]);
          const [liquidAdded, setLiquidAdded] = useState(0);
          const [precision, setPrecision] = useState(10);
          const [error, setError] = useState('');
          const [isDraggingOver, setIsDraggingOver] = useState(false);

          const addedSolidsVolume = objectsInCylinder.reduce((sum, obj) => sum + obj.volume, 0);
          const finalVolume = initialVolume + addedSolidsVolume + liquidAdded;
          const measuredVolume = finalVolume - initialVolume;

          useEffect(() => {
            if (finalVolume > MAX_VOLUME) setError(t.warnOverflow);
            else setError('');
          }, [finalVolume, t]);

          const handleDragStart = (e, obj) => {
            e.dataTransfer.setData('object', JSON.stringify(obj));
            e.dataTransfer.effectAllowed = 'copy';
          };

          const handleDrop = (e) => {
            e.preventDefault();
            setIsDraggingOver(false);
            try {
              const objData = e.dataTransfer.getData('object');
              if (objData) {
                const obj = JSON.parse(objData);
                if (finalVolume + obj.volume <= MAX_VOLUME) {
                  const newObj = {
                    ...obj,
                    uniqueId: Math.random().toString(36).substr(2, 9),
                    leftPos: 15 + Math.random() * 50, 
                  };
                  setObjectsInCylinder(prev => [...prev, newObj]);
                } else {
                  setError(t.warnOverflow);
                  setTimeout(() => setError(''), 3000);
                }
              }
            } catch (err) {}
          };

          const pourLiquid = (amount) => {
            if (finalVolume + amount <= MAX_VOLUME) setLiquidAdded(prev => prev + amount);
            else { setError(t.warnOverflow); setTimeout(() => setError(''), 3000); }
          };

          const resetSimulation = () => {
            setInitialVolume(40);
            setObjectsInCylinder([]);
            setLiquidAdded(0);
            setError('');
          };

          const renderGraduations = () => {
            const marks = [];
            for (let i = precision; i <= MAX_VOLUME; i += precision) {
              const isTen = i % 10 === 0;
              const isFive = i % 5 === 0 && !isTen;

              marks.push(
                <div key={i} className="absolute left-0 w-full flex items-center justify-start pointer-events-none z-30 translate-y-1/2" style={{ bottom: `${(i / MAX_VOLUME) * 100}%` }}>
                  {/* Grand trait (w-12 = 48px), Demi grand (w-6 = 24px), Demi de demi (w-3 = 12px) */}
                  <div className={`bg-[var(--accent)] flex-shrink-0 rounded-r-sm shadow-[0_0_5px_var(--accent-glow)] ${isTen ? 'w-12 h-[3.5px] opacity-100' : isFive ? 'w-6 h-[2.5px] opacity-75' : 'w-3 h-[1.5px] opacity-50'}`}></div>
                  {isTen && (
                    <span className="text-[16px] font-bold leading-none text-[var(--accent)] ml-2 drop-shadow-md mb-[2px] flex items-baseline filter drop-shadow-sm">
                      {i}
                    </span>
                  )}
                </div>
              );
            }
            return marks;
          };

          return (
            <div dir={isRtl ? "rtl" : "ltr"} className="w-full max-w-[1400px] mx-auto bg-[var(--surface)] text-[var(--text)] rounded-xl shadow-[0_8px_30px_var(--shadow)] border border-[var(--card-border)] p-6 font-sans flex flex-col xl:flex-row gap-8 transition-colors duration-300 mt-6 mb-12">
              
              {/* Panneau Latéral 1 (FR: Gauche / AR: Droite) : Objets & Paramètres */}
              <div className="w-full xl:w-[480px] flex flex-col gap-8">
                
                {/* 1. Objets */}
                <div className="bg-[var(--surface2)] p-8 rounded-xl border border-[var(--card-border)] shadow-sm hover:shadow-[0_0_15px_var(--shadow)] transition-all">
                  <h3 className={`font-bold text-[var(--accent)] mb-6 uppercase tracking-wider ${isRtl ? 'text-xl' : 'text-base'}`}>{t.objectsTitle}</h3>
                  <div className="flex justify-between gap-5 mb-8">
                    {objectsList.map((obj) => (
                      <div key={obj.id} className="flex-1 flex flex-col items-center justify-center bg-[var(--surface)] py-4 px-3 rounded-xl border border-[var(--card-border)] hover:border-[var(--accent)] hover:shadow-[0_0_15px_var(--accent-glow)] transition-all cursor-grab active:cursor-grabbing">
                        <div 
                          draggable onDragStart={(e) => handleDragStart(e, obj)}
                          className={`w-12 h-12 ${obj.color} ${obj.shape} mb-3 pointer-events-auto shadow-md`}
                          title={`${obj.volume} ${t.ml}`}
                        ></div>
                        <span className={`font-bold text-[var(--text)] ${isRtl ? 'text-lg' : 'text-sm'}`}>{obj.name}</span>
                      </div>
                    ))}
                  </div>
                  
                  <h3 className={`font-bold text-[var(--accent)] mb-5 uppercase tracking-wider ${isRtl ? 'text-xl' : 'text-base'}`}>{t.pourLiquid}</h3>
                  <div className="flex gap-4">
                    <button onClick={() => pourLiquid(5)} className="flex-1 py-4 bg-transparent text-[var(--accent)] text-lg font-bold rounded-lg border border-[var(--accent)] hover:bg-[var(--accent)] hover:text-white hover:shadow-[0_0_15px_var(--accent-glow)] flex justify-center items-center transition-all">
                      <Droplets className={`w-6 h-6 ${isRtl ? 'ml-2' : 'mr-2'}`} /> +5 {t.ml}
                    </button>
                    <button onClick={() => pourLiquid(10)} className="flex-1 py-4 bg-transparent text-[var(--accent)] text-lg font-bold rounded-lg border border-[var(--accent)] hover:bg-[var(--accent)] hover:text-white hover:shadow-[0_0_15px_var(--accent-glow)] flex justify-center items-center transition-all">
                      <Droplets className={`w-6 h-6 ${isRtl ? 'ml-2' : 'mr-2'}`} /> +10 {t.ml}
                    </button>
                  </div>
                </div>

                {/* 2. Paramètres */}
                <div className="bg-[var(--surface2)] p-8 rounded-xl border border-[var(--card-border)] shadow-sm hover:shadow-[0_0_15px_var(--shadow)] transition-all">
                  <h3 className={`font-bold text-[var(--accent)] mb-6 uppercase tracking-wider ${isRtl ? 'text-xl' : 'text-base'}`}>{t.settingsTitle}</h3>
                  <div className="flex justify-between items-center mb-8">
                    <span className="text-lg font-semibold text-[var(--text)]">{t.precisionLabel}</span>
                    <select value={String(precision)} onChange={(e) => setPrecision(parseInt(e.target.value, 10))} className="text-lg border border-[var(--accent)] rounded-lg py-2.5 px-5 font-bold bg-[var(--surface)] text-[var(--accent)] focus:ring-[var(--accent)] outline-none cursor-pointer hover:shadow-[0_0_10px_var(--accent-glow)] transition-all">
                      <option value="10">10 {t.ml}</option>
                      <option value="5">5 {t.ml}</option>
                      <option value="1">1 {t.ml}</option>
                    </select>
                  </div>
                  <div>
                    <div className="flex justify-between text-lg text-[var(--text)] mb-5">
                      <span className="font-semibold">{t.initialLevel}</span>
                      <span className="font-bold text-[var(--accent)]">{initialVolume} {t.ml}</span>
                    </div>
                    <input 
                      type="range" min="10" max="80" step={precision} value={initialVolume} 
                      onChange={(e) => {
                        const val = parseInt(e.target.value, 10);
                        if (val + addedSolidsVolume + liquidAdded <= MAX_VOLUME) setInitialVolume(val);
                      }}
                      disabled={objectsInCylinder.length > 0 || liquidAdded > 0}
                      className={`w-full h-3 rounded-lg appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition-all ${
                        objectsInCylinder.length > 0 || liquidAdded > 0 ? "bg-slate-300 dark:bg-slate-700" : "bg-[var(--accent)] shadow-[0_0_10px_var(--accent-glow)]"
                      }`}
                    />
                  </div>
                </div>
              </div>
              
              {/* Zône d'Expérience (Éprouvette au centre) */}
              <div className="flex-[1.2] bg-[var(--surface2)] rounded-xl border border-[var(--card-border)] p-6 flex flex-col items-center justify-center relative min-h-[650px] shadow-inner transition-colors duration-300">
                
                {error && (
                  <div className="absolute top-4 w-[90%] bg-red-100 dark:bg-red-900/40 border border-red-500 text-red-700 dark:text-red-400 px-4 py-2 rounded-lg flex items-center shadow-[0_0_15px_rgba(239,68,68,0.5)] z-40 text-sm font-bold animate-pulse">
                    <AlertCircle className={`w-5 h-5 flex-shrink-0 ${isRtl ? 'ml-2' : 'mr-2'}`} />
                    <span>{error}</span>
                  </div>
                )}

                {/* Structure en verre (1.5x -> w-[168px] h-[600px]) */}
                <div 
                  className={`relative w-[168px] h-[600px] mt-12 border-x-[4px] border-b-[4px] border-[var(--glass-border)] bg-[var(--glass-bg)] shadow-[inset_0_0_30px_var(--shadow)] rounded-b-[40px] transition-all duration-300 ${
                    isDraggingOver ? 'border-[var(--accent)] shadow-[0_0_45px_var(--accent-glow)]' : ''
                  }`}
                  onDragOver={(e) => { e.preventDefault(); setIsDraggingOver(true); e.dataTransfer.dropEffect = 'copy'; }}
                  onDragLeave={() => setIsDraggingOver(false)}
                  onDrop={handleDrop}
                >
                  {/* Effet 3D d'ouverture en haut */}
                  <div className={`absolute -top-[12px] -left-[4px] -right-[4px] h-[24px] border-[4px] border-[var(--glass-border)] rounded-[50%] z-20 transition-colors duration-300 ${isDraggingOver ? 'border-[var(--accent)]' : ''}`}></div>
                  <div className="absolute -top-[7px] left-0 right-0 h-[15px] rounded-[50%] bg-[var(--surface2)] z-10 transition-colors duration-300"></div>

                  {/* Reflet sur le verre */}
                  <div className="absolute left-3 top-3 bottom-9 w-2 bg-white/40 dark:bg-white/10 rounded-full z-10 pointer-events-none drop-shadow-sm"></div>

                  {/* Conteneur interne pour bloquer le liquide aux bords ronds en bas */}
                  <div className="absolute top-9 bottom-1.5 left-0 right-0 rounded-b-[30px] overflow-hidden" dir="ltr">
                    <div 
                      className="absolute bottom-0 left-0 w-full transition-all duration-700 ease-out"
                      style={{ height: `${(finalVolume / MAX_VOLUME) * 100}%`, backgroundColor: 'var(--liquid-current)' }}
                    >
                      {/* Ligne de surface de l'eau */}
                      <div className="absolute top-0 left-0 w-full h-[6px]" style={{ transform: 'translateY(-50%)', backgroundColor: 'var(--liquid-surface-current)', boxShadow: '0 0 20px var(--liquid-surface-current)' }}></div>
                      
                      {objectsInCylinder.map((obj, index) => (
                        <div 
                          key={obj.uniqueId}
                          className={`absolute w-[54px] h-[54px] ${obj.color} ${obj.shape} shadow-[0_8px_20px_rgba(0,0,0,0.6)] border border-white/30 transition-all duration-500`}
                          style={{ 
                            bottom: `${index * 12 + 3}px`, 
                            left: `${obj.leftPos}%`,
                            transform: `rotate(${Math.random() * 60 - 30}deg)`
                          }}
                        ></div>
                      ))}
                    </div>
                  </div>

                  {/* Zône des Graduations en haut plan */}
                  <div className="absolute top-9 bottom-1.5 left-0 right-0 pointer-events-none" dir="ltr">
                    {renderGraduations()}
                  </div>
                </div>
              </div>

              {/* Panneau Latéral 2 (FR: Droite / AR: Gauche) : Résultats & Reset */}
              <div className="w-full xl:w-[480px] flex flex-col gap-8">
                
                {/* 3. Résultats */}
                <div className="bg-[var(--surface2)] p-8 rounded-xl border border-[var(--card-border)] flex flex-col justify-center relative overflow-hidden transition-all hover:shadow-[0_0_15px_var(--accent-glow)] hover:border-[var(--accent)]">
                  <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-transparent to-[var(--accent)] opacity-5 pointer-events-none"></div>

                  <h3 className={`font-bold text-[var(--accent)] mb-6 text-center uppercase tracking-wider relative z-10 ${isRtl ? 'text-xl' : 'text-base'}`}>{t.resultsTitle}</h3>
                  
                  <div className="flex justify-between text-lg mb-5 px-2 relative z-10">
                     <span className="text-[var(--text)] font-semibold">{t.vInitial}</span>
                     <span className="font-bold text-[var(--text)]">{initialVolume} {t.ml}</span>
                  </div>
                  <div className="flex justify-between text-lg mb-8 px-2 pb-6 border-b border-[var(--card-border)] relative z-10">
                     <span className="text-[var(--accent)] font-semibold">{t.vFinal}</span>
                     <span className="font-bold text-[var(--accent)]">{finalVolume} {t.ml}</span>
                  </div>
                  
                  <div className="bg-[var(--surface)] p-5 rounded-xl border border-[var(--accent)] shadow-[0_0_15px_var(--accent-glow)] text-center relative z-10 transition-all">
                    <div className="text-base text-[var(--text)] opacity-80 mb-4 font-bold">{t.vAdded} <span className="font-mono mx-1" dir="ltr">V = V₂ - V₁</span></div>
                    <div className="text-3xl font-bold text-[var(--accent)] flex items-center justify-center gap-4" dir="ltr">
                      <span>{finalVolume}</span>
                      <span className="opacity-50 font-medium">-</span>
                      <span>{initialVolume}</span>
                      <span className="opacity-50 font-medium">=</span>
                      <span className="text-4xl font-black bg-[var(--accent)] text-white px-4 py-1.5 rounded-lg shadow-md">{measuredVolume} ml</span>
                    </div>
                  </div>
                </div>

                {/* Bouton Reset */}
                <button onClick={resetSimulation} className="w-full py-4 flex justify-center items-center text-lg text-red-500 bg-transparent hover:bg-red-500 hover:text-white rounded-xl font-bold transition-all border border-red-500 hover:shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                  <RefreshCcw className={`w-6 h-6 ${isRtl ? 'ml-3' : 'mr-3'}`} /> {t.emptyCylinder}
                </button>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<App />);
    </script>
</body>
</html>
